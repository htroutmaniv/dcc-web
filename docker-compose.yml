# Infrastructure only: Postgres + nginx reverse proxy to host Node/Vite.
# Run the app with: bun run dev  (or bun run start after build)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dcc
      POSTGRES_PASSWORD: dcc
      POSTGRES_DB: dcc
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dcc']
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - '${HTTP_PORT:-8080}:80'
    extra_hosts:
      - 'host.docker.internal:host-gateway'

volumes:
  pgdata:
