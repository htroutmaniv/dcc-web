# Reverse proxy only — API and Vite run on the host (same in dev and prod).
# Upstreams: host.docker.internal → your machine (Docker Desktop / Linux host-gateway).

upstream dcc_api {
    server host.docker.internal:3001;
    keepalive 16;
}

upstream dcc_web {
    server host.docker.internal:5173;
    keepalive 16;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 20M;

    # API + WebSockets
    location /api/ {
        proxy_pass http://dcc_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://dcc_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
    }

    # Vite dev server or `vite preview` (HMR / @vite WebSocket)
    location / {
        proxy_pass http://dcc_web;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
